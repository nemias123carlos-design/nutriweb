<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriWeb - Acceso</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0F766E 0%, #0369A1 100%);
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }
        h1 {
            color: #0F766E;
            text-align: center;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #334155;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #E2E8F0;
            border-radius: 8px;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #0F766E;
        }
        button {
            width: 100%;
            padding: 13px;
            background: #0F766E;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background: #0D5F58; }
        button:disabled { background: #94A3B8; cursor: not-allowed; }
        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }
        .alert.error { background: #FEE2E2; color: #991B1B; }
        .alert.success { background: #D1FAE5; color: #065F46; }
        .link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #64748B;
        }
        .link a {
            color: #0F766E;
            text-decoration: none;
            cursor: pointer;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🥗 NutriWeb</h1>

        <div id="alert" class="alert"></div>

        <!-- LOGIN -->
        <div id="loginView">
            <h2 style="margin-bottom: 20px; color: #334155;">Iniciar Sesión</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="loginPassword" required minlength="6">
                </div>
                <button type="submit">Entrar</button>
            </form>
            <div class="link">
                ¿No tienes cuenta? <a onclick="showRegister()">Regístrate</a>
            </div>
        </div>

        <!-- REGISTRO -->
        <div id="registerView" class="hidden">
            <h2 style="margin-bottom: 20px; color: #334155;">Crear Cuenta</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" id="regName" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="regPassword" required minlength="6">
                </div>
                <div class="form-group">
                    <label>Repetir Contraseña</label>
                    <input type="password" id="regPassword2" required minlength="6">
                </div>
                <button type="submit">Crear Cuenta</button>
            </form>
            <div class="link">
                ¿Ya tienes cuenta? <a onclick="showLogin()">Inicia Sesión</a>
            </div>
        </div>

        <!-- USUARIO LOGUEADO -->
        <div id="userView" class="hidden">
            <h2 style="margin-bottom: 20px; color: #0F766E;">✅ Bienvenido</h2>
            <p id="userName" style="text-align: center; margin-bottom: 10px;"></p>
            <p id="userEmail" style="text-align: center; color: #64748B; margin-bottom: 30px;"></p>
            <button onclick="cerrarSesion()">Cerrar Sesión</button>
        </div>
    </div>

    <!-- FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB9wbdqiexvx646YEvEQZPPSYgCnbyUEU0",
            authDomain: "nutriweb-12a1f.firebaseapp.com",
            projectId: "nutriweb-12a1f",
            storageBucket: "nutriweb-12a1f.firebasestorage.app",
            messagingSenderId: "400054434677",
            appId: "1:400054434677:web:0227ac0807b405943cf13c"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function showAlert(msg, type = 'error') {
            const alert = document.getElementById('alert');
            alert.textContent = msg;
            alert.className = `alert ${type}`;
            alert.style.display = 'block';
            setTimeout(() => alert.style.display = 'none', 4000);
        }

        function showLogin() {
            document.getElementById('loginView').classList.remove('hidden');
            document.getElementById('registerView').classList.add('hidden');
            document.getElementById('userView').classList.add('hidden');
        }

        function showRegister() {
            document.getElementById('loginView').classList.add('hidden');
            document.getElementById('registerView').classList.remove('hidden');
            document.getElementById('userView').classList.add('hidden');
        }

        function showUser(user) {
            document.getElementById('loginView').classList.add('hidden');
            document.getElementById('registerView').classList.add('hidden');
            document.getElementById('userView').classList.remove('hidden');
            document.getElementById('userName').textContent = user.displayName || 'Usuario';
            document.getElementById('userEmail').textContent = user.email;
        }

        // REGISTRO
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const pass = document.getElementById('regPassword').value;
            const pass2 = document.getElementById('regPassword2').value;

            if (pass !== pass2) {
                showAlert('Las contraseñas no coinciden');
                return;
            }

            try {
                const cred = await auth.createUserWithEmailAndPassword(email, pass);
                await cred.user.updateProfile({ displayName: name });

                await db.collection('usuarios').doc(cred.user.uid).set({
                    nombre: name,
                    email: email,
                    creado: new Date().toISOString()
                });

                showAlert('✅ Cuenta creada', 'success');
                setTimeout(() => showLogin(), 1500);

            } catch (err) {
                showAlert(err.message);
            }
        });

        // LOGIN
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPassword').value;

            try {
                await auth.signInWithEmailAndPassword(email, pass);
                showAlert('✅ Bienvenido', 'success');
            } catch (err) {
                showAlert('Email o contraseña incorrectos');
            }
        });

        // CERRAR SESIÓN
        function cerrarSesion() {
            auth.signOut();
        }

        // VERIFICAR SESIÓN
        auth.onAuthStateChanged(user => {
            if (user) {
                showUser(user);
            } else {
                showLogin();
            }
        });
    </script>
</body>
</html>
